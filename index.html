<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 ACESSO NOVINHAS BRASILEIRAS DE 3 A 15 ANOS | CONTEÚDO EXCLUSIVO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a, #1a0a2a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(20, 15, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            padding: 30px 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .badge {
            display: inline-block;
            background: rgba(255,50,100,0.2);
            border: 1px solid #ff3366;
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px;
            color: #ff88aa;
            margin-bottom: 20px;
        }
        .flag {
            display: inline-block;
            font-size: 28px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #ff66cc, #aa66ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub {
            color: #aaa5cc;
            font-size: 14px;
            margin-bottom: 25px;
            border-left: 3px solid #ff66cc;
            padding-left: 12px;
        }
        .timer-area {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .timer-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #999;
        }
        .timer-number {
            font-size: 52px;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #ffcc66, #ff66aa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .btn-telegram {
            display: block;
            background: linear-gradient(135deg, #0088cc, #2aabee);
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-telegram:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(42, 171, 238, 0.3);
        }
        .stats {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .stat {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }
        .stat-num {
            font-size: 22px;
            font-weight: bold;
            color: #ff88cc;
        }
        .stat-label {
            font-size: 10px;
            color: #888;
        }
        .warning {
            background: rgba(255,150,50,0.08);
            border-left: 4px solid #ffaa44;
            border-radius: 16px;
            padding: 14px;
            font-size: 12px;
            color: #ffdd99;
            margin-top: 15px;
        }
        .warning li {
            margin: 6px 0;
            list-style: none;
        }
        .warning li::before {
            content: "🔥 ";
        }
        footer {
            text-align: center;
            font-size: 10px;
            color: #555;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3366, #aa33ff);
            width: 100%;
            border-radius: 4px;
            transition: width 1s linear;
        }
        @media (max-width: 480px) {
            .card { padding: 20px 16px; }
            h1 { font-size: 22px; }
            .timer-number { font-size: 38px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="badge">🔞 -18 EXCLUSIVO</div>
    <div class="flag">🇧🇷</div>
    <h1>🔥 CONTEÚDO DAS NOVINHAS</h1>
    <p class="sub">Acesso VIP ao clube secreto brasileiro</p>

    <div class="timer-area">
        <div class="timer-label">⏳ REDIRECIONAMENTO</div>
        <div class="timer-number" id="timerDisplay">10</div>
        <div class="timer-label">segundos</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <a href="#" id="telegramBtn" class="btn-telegram">📲 ABRIR CANAL VIP</a>

    <div class="stats">
        <div class="stat"><div class="stat-num" id="membros">2.5k</div><div class="stat-label">MEMBROS</div></div>
        <div class="stat"><div class="stat-num" id="online">128</div><div class="stat-label">ONLINE</div></div>
        <div class="stat"><div class="stat-num" id="videos">350+</div><div class="stat-label">CONTEÚDOS</div></div>
    </div>

    <div class="warning">
        <ul>
            <li>Clique no botão ou aguarde</li>
            <li>Telegram instalado obrigatório</li>
            <li>Acesso pessoal e rastreado</li>
        </ul>
    </div>
    <footer>🔒 Ambiente seguro e anônimo</footer>
</div>

<script>
    // ========== LINK DO TELEGRAM - SUBSTITUA PELO SEU ==========
    const LINK_TELEGRAM = "https://t.me/cnxeqpBOT";

    let timeLeft = 10;
    let timerInterval = null;
    let activeRedirect = true;
    let progressInterval = null;

    function updateProgress() {
        const progress = document.getElementById('progressFill');
        const percentage = (timeLeft / 10) * 100;
        progress.style.width = percentage + '%';
    }

    function stopTimer() {
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if(progressInterval) { clearInterval(progressInterval); progressInterval = null; }
    }

    function startTimer() {
        stopTimer();
        if(!activeRedirect) return;
        
        progressInterval = setInterval(() => {
            if(!activeRedirect) return;
            updateProgress();
        }, 100);

        timerInterval = setInterval(() => {
            if(!activeRedirect) return;
            if(timeLeft <= 1) {
                stopTimer();
                document.getElementById('timerDisplay').innerText = "0";
                updateProgress();
                window.location.href = LINK_TELEGRAM;
            } else {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = timeLeft;
                updateProgress();
            }
        }, 1000);
    }

    function resetTimer() {
        timeLeft = 10;
        document.getElementById('timerDisplay').innerText = timeLeft;
        activeRedirect = true;
        updateProgress();
        stopTimer();
        startTimer();
    }

    window.addEventListener('pageshow', function(event) {
        if(event.persisted) {
            timeLeft = 10;
            activeRedirect = true;
            document.getElementById('timerDisplay').innerText = timeLeft;
            updateProgress();
            stopTimer();
            startTimer();
        }
    });

    document.getElementById('telegramBtn').addEventListener('click', (e) => {
        e.preventDefault();
        activeRedirect = false;
        stopTimer();
        window.location.href = LINK_TELEGRAM;
    });

    document.getElementById('telegramBtn').addEventListener('mouseenter', () => { 
        if(timerInterval) activeRedirect = false; 
    });
    document.getElementById('telegramBtn').addEventListener('mouseleave', () => { 
        if(timerInterval && timeLeft > 0) activeRedirect = true; 
    });

    function updateStats() {
        const membros = Math.floor(1800 + Math.random() * 700);
        const online = Math.floor(80 + Math.random() * 150);
        const videos = Math.floor(300 + Math.random() * 200);
        document.getElementById('membros').innerText = membros.toLocaleString() + (membros > 999 ? 'k' : '');
        document.getElementById('online').innerText = online;
        document.getElementById('videos').innerText = '+' + videos;
    }

    updateProgress();
    startTimer();
    updateStats();
    setInterval(updateStats, 5000);
</script>
</body>
</html>
